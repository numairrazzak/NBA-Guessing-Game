name: Update NBA Stats

on:
  schedule:
    # 6am PST = 14:00 UTC (13:00 UTC during daylight saving)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas lxml

      - name: Run data refresh script
        run: python refresh_data.py

      - name: Update date in index.html
        run: |
          TODAY=$(date +'%B %-d, %Y')
          sed -i "s/Updated: [^<]*/Updated: $TODAY/" index.html

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add nba_players_2025-26_stats.csv index.html
          git diff --staged --quiet || git commit -m "Update NBA stats data"
          git push
